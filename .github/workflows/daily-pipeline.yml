name: Daily Gold Pipeline

on:
  schedule:
    # Run at 22:00 UTC (06:00 Beijing Time) on weekdays
    # Markets are closed on weekends, no new data
    - cron: '0 22 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: gold-dashboard/pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r gold-dashboard/pipeline/requirements.txt

      - name: Run daily pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          cd gold-dashboard
          python pipeline/run_daily.py

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gold-dashboard/pipeline/output/*.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily: update pipeline output $(date -u +%Y-%m-%d)"
            git push
          fi
